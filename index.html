<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power-Up Sequence Designer</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .rail-card { background: #252525; border-radius: 6px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); position: relative; }
        label { display: block; font-size: 0.7rem; color: #888; margin-top: 8px; text-transform: uppercase; font-weight: bold; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 2px; }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative; overflow: auto; }
        #visualizer { min-width: 1200px; min-height: 800px; transition: background 0.3s; }
        
        /* Datasheet Mode Toggle */
        .toggle-container { background: #2d2d2d; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #444; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-container input { width: auto; }

        button { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button.secondary { background: #444; color: #fff; }
        .remove-btn { position: absolute; top: 5px; right: 5px; background: none; color: #ff5252; border:none; cursor:pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    
    <label class="toggle-container">
        <input type="checkbox" id="datasheetMode" onchange="render()"> 
        <span>DATASHEET MODE (B&W)</span>
    </label>

    <div id="railList"></div>
    
    <button onclick="addRail()">+ ADD VOLTAGE RAIL</button>
    <button class="secondary" onclick="exportSVG()">DOWNLOAD SVG</button>
</div>

<div class="main">
    <svg id="visualizer" width="2000" height="800">
        </svg>
</div>

<script>
    let rails = [
        { id: 'r1', name: '12V_VIN', delay: 0, rise: 5, parent: 'none', color: '#4fc3f7' },
        { id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, parent: 'r1', color: '#81c784' },
        { id: 'r3', name: '1V2_CORE', delay: 10, rise: 5, parent: 'r2', color: '#ffb74d' }
    ];

    function addRail() {
        const id = 'r' + Math.random().toString(36).substr(2, 5);
        const lastId = rails.length > 0 ? rails[rails.length-1].id : 'none';
        rails.push({ id, name: 'NEW_RAIL', delay: 10, rise: 5, parent: lastId, color: '#ba68c8' });
        updateUI();
    }

    function removeRail(id) {
        rails = rails.filter(r => r.id !== id);
        updateUI();
    }

    function updateParam(id, key, value) {
        const rail = rails.find(r => r.id === id);
        if (rail) {
            rail[key] = (key === 'name' || key === 'parent' || key === 'color') ? value : (parseFloat(value) || 0);
            render();
        }
    }

    function updateUI() {
        const list = document.getElementById('railList');
        list.innerHTML = '';
        rails.forEach((rail) => {
            const card = document.createElement('div');
            card.className = 'rail-card';
            card.style.borderLeftColor = rail.color;
            let parentOptions = `<option value="none">None (Start 0)</option>`;
            rails.forEach(r => { if(r.id !== rail.id) parentOptions += `<option value="${r.id}" ${rail.parent === r.id ? 'selected' : ''}>${r.name}</option>`; });

            card.innerHTML = `
                <button class="remove-btn" onclick="removeRail('${rail.id}')">×</button>
                <input type="text" value="${rail.name}" oninput="updateParam('${rail.id}', 'name', this.value)">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Delay (ms)</label><input type="number" value="${rail.delay}" oninput="updateParam('${rail.id}', 'delay', this.value)"></div>
                    <div style="flex:1"><label>Rise (ms)</label><input type="number" value="${rail.rise}" oninput="updateParam('${rail.id}', 'rise', this.value)"></div>
                </div>
                <label>Parent</label><select onchange="updateParam('${rail.id}', 'parent', this.value)">${parentOptions}</select>
                <label>Color</label><input type="color" value="${rail.color}" oninput="updateParam('${rail.id}', 'color', this.value)">
            `;
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isBW = document.getElementById('datasheetMode').checked;
        
        // Colors based on mode
        const bgColor = isBW ? "#ffffff" : "#0a0a0a";
        const gridColor = isBW ? "#eeeeee" : "#222222";
        const textColor = isBW ? "#000000" : "#888888";
        const arrowColor = isBW ? "#333333" : "#ffea00";

        svg.style.background = bgColor;
        svg.innerHTML = '';
        
        const SCALE_X = 5; 
        const LANE_H = 80;
        const SIG_H = 35;
        const X_OFF = 150;
        const railPos = {};

        // Grid
        for(let t=0; t<2000; t+=50) {
            let x = t * SCALE_X + X_OFF;
            svg.innerHTML += `<line x1="${x}" y1="0" x2="${x}" y2="100%" stroke="${gridColor}" stroke-width="1" />`;
            if (t % 100 === 0) svg.innerHTML += `<text x="${x}" y="15" fill="${textColor}" font-size="10" text-anchor="middle">${t}ms</text>`;
        }

        rails.forEach((rail, i) => {
            const yBase = (i + 1) * LANE_H + 40;
            const yHigh = yBase - SIG_H;
            let startX = X_OFF;
            if (rail.parent !== 'none' && railPos[rail.parent]) startX = railPos[rail.parent].stableX;

            const rStart = startX + (rail.delay * SCALE_X);
            const rEnd = rStart + (rail.rise * SCALE_X);
            railPos[rail.id] = { stableX: rEnd, y: yBase };

            // Arrows & Dashed Lines
            if (rail.parent !== 'none' && rail.delay > 0) {
                drawArrow(svg, startX, rStart, yBase - 15, `${rail.delay}ms`, arrowColor);
                svg.innerHTML += `<line x1="${startX}" y1="${railPos[rail.parent].y}" x2="${startX}" y2="${yBase}" stroke="${isBW?'#999':'#444'}" stroke-dasharray="3"/>`;
                svg.innerHTML += `<line x1="${rStart}" y1="${yBase-25}" x2="${rStart}" y2="${yBase}" stroke="${isBW?'#999':'#444'}" stroke-dasharray="3"/>`;
            }

            // Signal Line
            const strokeColor = isBW ? "#000000" : rail.color;
            const pathData = `M ${X_OFF},${yBase} L ${rStart},${yBase} L ${rEnd},${yHigh} L 1800,${yHigh}`;
            svg.innerHTML += `
                <text x="10" y="${yBase - 5}" fill="${strokeColor}" font-size="12" font-weight="bold">${rail.name}</text>
                <path d="${pathData}" fill="none" stroke="${strokeColor}" stroke-width="${isBW?2:2.5}" />
            `;
        });
    }

    function drawArrow(svg, x1, x2, y, text, color) {
        svg.innerHTML += `
            <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="1"/>
            <path d="M ${x1+4} ${y-3} L ${x1} ${y} L ${x1+4} ${y+3}" fill="none" stroke="${color}"/>
            <path d="M ${x2-4} ${y-3} L ${x2} ${y} L ${x2-4} ${y+3}" fill="none" stroke="${color}"/>
            <text x="${(x1+x2)/2}" y="${y-5}" fill="${color}" font-size="10" text-anchor="middle" font-family="monospace">${text}</text>
        `;
    }

    function exportSVG() {
        const svg = document.getElementById('visualizer');
        const serializer = new XMLSerializer();
        let source = serializer.serializeToString(svg);
        if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
            source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
        }
        const blob = new Blob([source], {type: 'image/svg+xml;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'power_sequence.svg';
        link.click();
    }

    updateUI();
</script>

</body>
</html>
