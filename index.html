<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Power Sequence Renderer</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #121212; color: #00ff41; padding: 20px; }
        .editor { display: flex; gap: 20px; }
        .controls { width: 350px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .viewer { flex-grow: 1; background: #000; border-radius: 8px; border: 1px solid #333; overflow-x: auto; padding: 20px; }
        .rail-input { margin-bottom: 15px; border-left: 3px solid #4a9eff; padding-left: 10px; }
        input { background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 5px; width: 60px; margin-bottom: 5px; }
        input.name { width: 120px; color: #4a9eff; font-weight: bold; }
        label { font-size: 12px; color: #888; display: inline-block; width: 80px; }
        svg { background: #080808; border-left: 1px dashed #444; }
        .grid-line { stroke: #222; stroke-width: 1; }
        .rail-line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .rail-label { fill: #888; font-size: 12px; }
    </style>
</head>
<body>

<h2>[ LIVE_POWER_SEQ_CONSTRUCTOR ]</h2>

<div class="editor">
    <div class="controls" id="controlPanel">
        <div id="inputs">
            <div class="rail-input">
                <input type="text" value="12V_VIN" class="name" oninput="render()"><br>
                <label>Delay (ms)</label><input type="number" value="0" class="delay" oninput="render()"><br>
                <label>Rise (ms)</label><input type="number" value="5" class="rise" oninput="render()">
            </div>
            <div class="rail-input">
                <input type="text" value="3V3_SYS" class="name" oninput="render()"><br>
                <label>Delay (ms)</label><input type="number" value="20" class="delay" oninput="render()"><br>
                <label>Rise (ms)</label><input type="number" value="10" class="rise" oninput="render()">
            </div>
        </div>
        <button onclick="addRail()" style="width:100%; padding:10px; cursor:pointer;">+ ADD RAIL</button>
    </div>

    <div class="viewer">
        <svg id="svgRender" width="1000" height="500">
            </svg>
    </div>
</div>

<script>
    function addRail() {
        const div = document.createElement('div');
        div.className = 'rail-input';
        div.innerHTML = `
            <input type="text" value="NEW_RAIL" class="name" oninput="render()"><br>
            <label>Delay (ms)</label><input type="number" value="10" class="delay" oninput="render()"><br>
            <label>Rise (ms)</label><input type="number" value="5" class="rise" oninput="render()">
        `;
        document.getElementById('inputs').appendChild(div);
        render();
    }

    function render() {
        const svg = document.getElementById('svgRender');
        svg.innerHTML = ''; // Clear previous
        
        const names = document.querySelectorAll('.name');
        const delays = document.querySelectorAll('.delay');
        const rises = document.querySelectorAll('.rise');
        
        const SCALE_X = 5; // 1ms = 5px
        const LANE_HEIGHT = 60;
        const SIGNAL_HEIGHT = 30;
        let cumulativeTime = 20; // Initial margin

        // Draw vertical grid lines every 50ms
        for(let g = 0; g < 1000; g += 50) {
            let x = g * SCALE_X + 100;
            svg.innerHTML += `<line x1="${x}" y1="0" x2="${x}" y2="500" class="grid-line" />`;
            svg.innerHTML += `<text x="${x}" y="15" fill="#333" font-size="10">${g}ms</text>`;
        }

        names.forEach((n, i) => {
            const d = parseFloat(delays[i].value) || 0;
            const r = parseFloat(rises[i].value) || 0;
            const yBase = (i + 1) * LANE_HEIGHT;
            const yHigh = yBase - SIGNAL_HEIGHT;
            
            cumulativeTime += d;
            
            const startX = 100; // Start of the timeline
            const riseStartX = startX + (cumulativeTime * SCALE_X);
            const riseEndX = riseStartX + (r * SCALE_X);
            const fullEndX = 950;

            // Define the signal path: Low -> Ramp Up -> High
            const pathData = `
                M ${startX},${yBase} 
                L ${riseStartX},${yBase} 
                L ${riseEndX},${yHigh} 
                L ${fullEndX},${yHigh}
            `;

            // Draw the line
            const color = `hsl(${(i * 40) % 360}, 70%, 60%)`;
            svg.innerHTML += `
                <text x="10" y="${yBase - 10}" class="rail-label">${n.value}</text>
                <path d="${pathData}" class="rail-line" stroke="${color}" />
            `;

            cumulativeTime += r; // Sequence next rail after this one rises
        });
    }

    render(); // Initial call
</script>
</body>
</html>
