<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Power-Up Designer v3.2</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; --break: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: 800; }
        .item-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; }
        .item-card.break { border-left-color: var(--break); }
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 4px; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #444; color: #ff5252; border: none; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; }
        .main { flex-grow: 1; background: #0a0a0a; overflow: auto; }
        #visualizer { min-width: 3000px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; position: sticky; bottom: 0; background: var(--panel); padding-top: 10px; }
        button { border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-rail { background: var(--accent); color: #000; }
        .btn-break { background: var(--break); color: #000; }
        .toggle-container { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    <label class="toggle-container">
        <input type="checkbox" id="datasheetMode" onchange="render()"> 
        <span>DATASHEET MODE (B&W)</span>
    </label>
    <div id="itemList"></div>
    <div class="btn-group">
        <button class="btn-rail" onclick="addItem('rail')">+ RAIL</button>
        <button class="btn-break" onclick="addItem('break')">+ BREAK</button>
    </div>
</div>

<div class="main"><svg id="visualizer" width="3000" height="1000"></svg></div>

<script>
    let sequence = [
        { type: 'rail', id: 'r1', name: '12V_VIN', delay: 0, rise: 5, color: '#4fc3f7', parentId: 'none' },
        { type: 'break', id: 'b1', duration: 300, visualWidth: 20 },
        { type: 'rail', id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, color: '#81c784', parentId: 'r1' }
    ];

    function addItem(type) {
        const id = 'id' + Math.random().toString(36).substr(2, 5);
        if (type === 'rail') {
            sequence.push({ type: 'rail', id, name: 'NEW_RAIL', delay: 10, rise: 5, color: '#ba68c8', parentId: 'none' });
        } else {
            sequence.push({ type: 'break', id, duration: 200, visualWidth: 20 });
        }
        updateUI();
    }

    function removeItem(id) {
        sequence = sequence.filter(i => i.id !== id);
        updateUI();
    }

    function updateVal(id, key, val) {
        const item = sequence.find(i => i.id === id);
        if (item) {
            item[key] = (key === 'name' || key === 'color' || key === 'parentId') ? val : (parseFloat(val) || 0);
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        const railOptions = sequence.filter(i => i.type === 'rail');

        sequence.forEach(item => {
            const card = document.createElement('div');
            card.className = `item-card ${item.type}`;
            if (item.type === 'rail') {
                let options = `<option value="none">None (Start 0)</option>`;
                railOptions.forEach(r => {
                    if (r.id !== item.id) options += `<option value="${r.id}" ${item.parentId === r.id ? 'selected' : ''}>${r.name}</option>`;
                });

                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <input type="text" value="${item.name}" oninput="updateVal('${item.id}', 'name', this.value)">
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>Delay</label><input type="number" value="${item.delay}" oninput="updateVal('${item.id}', 'delay', this.value)"></div>
                        <div style="flex:1"><label>Rise</label><input type="number" value="${item.rise}" oninput="updateVal('${item.id}', 'rise', this.value)"></div>
                    </div>
                    <label>Parent Rail</label>
                    <select onchange="updateVal('${item.id}', 'parentId', this.value)">${options}</select>
                    <label>Color</label><input type="color" value="${item.color}" oninput="updateVal('${item.id}', 'color', this.value)">`;
            } else {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <div style="font-weight:bold; color:var(--break); font-size:0.7rem">CURVY BREAK</div>
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>Duration (ms)</label><input type="number" value="${item.duration}" oninput="updateVal('${item.id}', 'duration', this.value)"></div>
                        <div style="flex:1"><label>Width (px)</label><input type="number" value="${item.visualWidth}" oninput="updateVal('${item.id}', 'visualWidth', this.value)"></div>
                    </div>`;
            }
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isBW = document.getElementById('datasheetMode').checked;
        const colors = { bg: isBW?"#fff":"#0a0a0a", text: isBW?"#333":"#888", arrow: isBW?"#444":"#ffea00" };
        svg.style.background = colors.bg;
        svg.innerHTML = '';
        
        const SCALE = 5, LANE_H = 100, X_OFF = 160;
        let globalTimelineX = X_OFF;
        let railGeometries = {}; 
        let breakList = [];

        let railIndex = 0;
        sequence.forEach((item) => {
            if (item.type === 'break') {
                breakList.push({ x: globalTimelineX, width: item.visualWidth, ms: item.duration });
                globalTimelineX += item.visualWidth;
            } else {
                const y = (railIndex + 1) * LANE_H + 50;
                let anchorX = globalTimelineX;
                if (item.parentId !== 'none' && railGeometries[item.parentId]) {
                    anchorX = railGeometries[item.parentId].end;
                }
                const start = anchorX + (item.delay * SCALE);
                const end = start + (item.rise * SCALE);
                
                railGeometries[item.id] = { y, start, end, name: item.name, color: isBW ? "#000" : item.color, anchorX, delay: item.delay };
                globalTimelineX = end;
                railIndex++;
            }
        });

        const totalHeight = (railIndex + 1) * LANE_H + 50;
        svg.setAttribute('height', totalHeight);

        // Draw Traces: Start from X_OFF to restore the "off" baseline
        Object.values(railGeometries).forEach(g => {
            const path = `M ${X_OFF},${g.y} L ${g.start},${g.y} L ${g.end},${g.y-40} L 2800,${g.y-40}`;
            svg.innerHTML += `<path d="${path}" fill="none" stroke="${g.color}" stroke-width="3" stroke-linecap="round" />`;
            svg.innerHTML += `<text x="15" y="${g.y-10}" fill="${g.color}" font-size="14" font-weight="bold">${g.name}</text>`;
            svg.innerHTML += `<text x="${g.start}" y="${g.y + 15}" fill="${colors.text}" font-size="10" text-anchor="middle">T0</text>`;
            svg.innerHTML += `<text x="${g.end}" y="${g.y - 45}" fill="${colors.text}" font-size="10" text-anchor="middle">T1</text>`;

            if (g.delay > 0) drawArrow(svg, g.anchorX, g.start, g.y-15, `${g.delay}ms`, colors.arrow);
        });

        // Draw Breaks on Top to mask baselines and high signals
        breakList.forEach(b => drawCurvyBreak(svg, b.x, b.width, b.ms, totalHeight, colors.text, colors.bg));
    }

    function drawCurvyBreak(svg, x, width, ms, height, color, bg) {
        const midX = x + (width / 2);
        const curve = width / 3;
        const gap = width / 5;
        
        svg.innerHTML += `<rect x="${x}" y="0" width="${width}" height="${height}" fill="${bg}" />`;
        
        const p = (off) => {
            let d = `M ${off} 0`;
            for (let y = 0; y < height; y += 100) d += ` C ${off + curve} ${y + 25}, ${off - curve} ${y + 75}, ${off} ${y + 100}`;
            return d;
        };
        
        svg.innerHTML += `<path d="${p(midX-gap)}" stroke="${color}" stroke-width="2" fill="none" />`;
        svg.innerHTML += `<path d="${p(midX+gap)}" stroke="${color}" stroke-width="2" fill="none" />`;
        
        svg.innerHTML += `
            <rect x="${midX - 35}" y="15" width="70" height="20" fill="${bg}" rx="4" />
            <text x="${midX}" y="30" fill="${color}" font-size="13" font-weight="bold" text-anchor="middle" font-family="monospace">${ms}ms</text>
        `;
    }

    function drawArrow(svg, x1, x2, y, txt, col) {
        svg.innerHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="1.5" />
            <path d="M${x1+6} ${y-4} L${x1} ${y} L${x1+6} ${y+4} M${x2-6} ${y-4} L${x2} ${y} L${x2-6} ${y+4}" fill="none" stroke="${col}" />
            <text x="${(x1+x2)/2}" y="${y-8}" fill="${col}" font-size="11" text-anchor="middle" font-weight="bold" font-family="monospace">${txt}</text>`;
    }

    updateUI();
</script>
</body>
</html>
