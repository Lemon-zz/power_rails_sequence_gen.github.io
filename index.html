<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power-Up Sequence Designer v2.1</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Controls */
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: 600; }
        
        .rail-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; transition: transform 0.1s; }
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; font-size: 0.9rem; margin-top: 4px; }
        input[type="text"] { padding-right: 35px; } /* Space for the X button */
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        /* Fixed Delete Button */
        .remove-btn { 
            position: absolute; top: 12px; right: 12px; 
            background: #444; color: #ff5252; border: none; 
            cursor: pointer; font-size: 14px; font-weight: bold;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: background 0.2s;
        }
        .remove-btn:hover { background: #ff5252; color: white; }
        
        /* Main Viewer */
        .main { flex-grow: 1; display: flex; flex-direction: column; background: #0a0a0a; overflow: auto; position: relative; }
        #visualizer { min-width: 1600px; min-height: 900px; transition: background 0.3s; }
        
        .toggle-container { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .toggle-container input { width: auto; margin: 0; cursor: pointer; }

        button.primary { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; font-size: 0.9rem; }
        button.secondary { background: #444; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-top: 8px; width: 100%; }
        button:hover { opacity: 0.9; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    
    <label class="toggle-container">
        <input type="checkbox" id="datasheetMode" onchange="render()"> 
        <span>DATASHEET MODE (B&W)</span>
    </label>

    <div id="railList"></div>
    
    <button class="primary" onclick="addRail()">+ ADD VOLTAGE RAIL</button>
    <button class="secondary" onclick="exportSVG()">DOWNLOAD SVG</button>
</div>

<div class="main">
    <svg id="visualizer" width="2000" height="900">
        </svg>
</div>

<script>
    let rails = [
        { id: 'r1', name: '12V_VIN', delay: 0, rise: 5, parent: 'none', color: '#4fc3f7' },
        { id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, parent: 'r1', color: '#81c784' },
        { id: 'r3', name: '1V2_CORE', delay: 10, rise: 5, parent: 'r2', color: '#ffb74d' }
    ];

    function addRail() {
        const id = 'r' + Math.random().toString(36).substr(2, 5);
        const lastId = rails.length > 0 ? rails[rails.length-1].id : 'none';
        rails.push({ id, name: 'NEW_RAIL', delay: 15, rise: 5, parent: lastId, color: '#ba68c8' });
        updateUI();
    }

    function removeRail(id) {
        if(rails.length <= 1) return; // Keep at least one rail
        rails = rails.filter(r => r.id !== id);
        updateUI();
    }

    function updateParam(id, key, value) {
        const rail = rails.find(r => r.id === id);
        if (rail) {
            rail[key] = (key === 'name' || key === 'parent' || key === 'color') ? value : (parseFloat(value) || 0);
            render();
        }
    }

    function updateUI() {
        const list = document.getElementById('railList');
        list.innerHTML = '';
        rails.forEach((rail) => {
            const card = document.createElement('div');
            card.className = 'rail-card';
            card.style.borderLeftColor = rail.color;
            
            let parentOptions = `<option value="none">None (Start 0)</option>`;
            rails.forEach(r => { 
                if(r.id !== rail.id) parentOptions += `<option value="${r.id}" ${rail.parent === r.id ? 'selected' : ''}>${r.name}</option>`; 
            });

            card.innerHTML = `
                <button class="remove-btn" title="Delete Rail" onclick="removeRail('${rail.id}')">✕</button>
                <input type="text" value="${rail.name}" placeholder="Rail Name" oninput="updateParam('${rail.id}', 'name', this.value)">
                <div class="row">
                    <div><label>Delay (ms)</label><input type="number" value="${rail.delay}" oninput="updateParam('${rail.id}', 'delay', this.value)"></div>
                    <div><label>Rise (ms)</label><input type="number" value="${rail.rise}" oninput="updateParam('${rail.id}', 'rise', this.value)"></div>
                </div>
                <label>Parent Dependency</label>
                <select onchange="updateParam('${rail.id}', 'parent', this.value)">${parentOptions}</select>
                <label>Rail Color</label>
                <input type="color" value="${rail.color}" oninput="updateParam('${rail.id}', 'color', this.value)">
            `;
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isBW = document.getElementById('datasheetMode').checked;
        
        const bgColor = isBW ? "#ffffff" : "#0a0a0a";
        const gridColor = isBW ? "#e5e5e5" : "#222222";
        const textColor = isBW ? "#000000" : "#888888";
        const arrowColor = isBW ? "#444444" : "#ffea00";

        svg.style.background = bgColor;
        svg.innerHTML = '';
        
        const SCALE_X = 5; 
        const LANE_H = 85;
        const SIG_H = 35;
        const X_OFF = 160;
        const railPos = {};
        const milestones = [];

        // 1. Time Grid
        for(let t=0; t<=2000; t+=50) {
            let x = t * SCALE_X + X_OFF;
            svg.innerHTML += `<line x1="${x}" y1="0" x2="${x}" y2="100%" stroke="${gridColor}" stroke-width="1" />`;
            if (t % 100 === 0) svg.innerHTML += `<text x="${x}" y="25" fill="${textColor}" font-size="10" text-anchor="middle" font-family="monospace">${t}ms</text>`;
        }

        // 2. Rails
        rails.forEach((rail, i) => {
            const yBase = (i + 1) * LANE_H + 60;
            const yHigh = yBase - SIG_H;
            let startX = X_OFF;
            
            if (rail.parent !== 'none' && railPos[rail.parent]) {
                startX = railPos[rail.parent].stableX;
            }

            const rStart = startX + (rail.delay * SCALE_X);
            const rEnd = rStart + (rail.rise * SCALE_X);
            railPos[rail.id] = { stableX: rEnd, y: yBase };
            
            milestones.push({ x: rEnd, label: `T${i}` });

            // Parent-Child Connector Arrows
            if (rail.parent !== 'none' && rail.delay > 0) {
                drawArrow(svg, startX, rStart, yBase - 15, `${rail.delay}ms`, arrowColor);
                svg.innerHTML += `<line x1="${startX}" y1="${railPos[rail.parent].y}" x2="${startX}" y2="${yBase}" stroke="${isBW?'#bbb':'#444'}" stroke-dasharray="4,2"/>`;
                svg.innerHTML += `<line x1="${rStart}" y1="${yBase-28}" x2="${rStart}" y2="${yBase}" stroke="${isBW?'#bbb':'#444'}" stroke-dasharray="4,2"/>`;
            }

            // Signal Trace
            const strokeColor = isBW ? "#000000" : rail.color;
            const pathData = `M ${X_OFF},${yBase} L ${rStart},${yBase} L ${rEnd},${yHigh} L 1900,${yHigh}`;
            svg.innerHTML += `
                <text x="15" y="${yBase - 8}" fill="${strokeColor}" font-size="13" font-weight="bold">${rail.name}</text>
                <path d="${pathData}" fill="none" stroke="${strokeColor}" stroke-width="${isBW?2.5:3}" stroke-linejoin="round" stroke-linecap="round"/>
            `;
        });

        // 3. Timing Milestones Axis
        const markerY = (rails.length + 1) * LANE_H + 120;
        svg.innerHTML += `<line x1="${X_OFF}" y1="${markerY}" x2="1900" y2="${markerY}" stroke="${textColor}" stroke-width="1.5" />`;
        
        milestones.forEach((m) => {
            svg.innerHTML += `
                <line x1="${m.x}" y1="${markerY - 6}" x2="${m.x}" y2="${markerY + 6}" stroke="${textColor}" stroke-width="2" />
                <text x="${m.x}" y="${markerY + 24}" fill="${textColor}" font-size="12" font-weight="bold" text-anchor="middle" font-family="monospace">${m.label}</text>
            `;
        });
    }

    function drawArrow(svg, x1, x2, y, text, color) {
        svg.innerHTML += `
            <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="1.5"/>
            <path d="M ${x1+5} ${y-4} L ${x1} ${y} L ${x1+5} ${y+4}" fill="none" stroke="${color}"/>
            <path d="M ${x2-5} ${y-4} L ${x2} ${y} L ${x2-5} ${y+4}" fill="none" stroke="${color}"/>
            <text x="${(x1+x2)/2}" y="${y-8}" fill="${color}" font-size="11" text-anchor="middle" font-family="monospace" font-weight="bold">${text}</text>
        `;
    }

    function exportSVG() {
        const svg = document.getElementById('visualizer');
        const serializer = new XMLSerializer();
        const source = serializer.serializeToString(svg);
        const blob = new Blob([source], {type: 'image/svg+xml;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `power_sequence_${new Date().getTime()}.svg`;
        link.click();
    }

    updateUI(); // Initialize
</script>

</body>
