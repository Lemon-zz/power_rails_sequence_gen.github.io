<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Power-Up Designer (Curvy Break Edition)</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; --break: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .item-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; }
        .item-card.break { border-left-color: var(--break); }
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 4px; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #444; color: #ff5252; border: none; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; z-index: 10; }
        .main { flex-grow: 1; background: #0a0a0a; overflow: auto; }
        #visualizer { min-width: 2500px; min-height: 1000px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-rail { background: var(--accent); color: #000; }
        .btn-break { background: var(--break); color: #000; }
        .toggle-container { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    <label class="toggle-container"><input type="checkbox" id="datasheetMode" onchange="render()"> <span>DATASHEET MODE (B&W)</span></label>
    <div id="itemList"></div>
    <div class="btn-group">
        <button class="btn-rail" onclick="addItem('rail')">+ RAIL</button>
        <button class="btn-break" onclick="addItem('break')">+ BREAK</button>
    </div>
</div>

<div class="main"><svg id="visualizer" width="3000" height="1000"></svg></div>

<script>
    let sequence = [
        { type: 'rail', id: 'r1', name: '12V_VIN', delay: 0, rise: 5, color: '#4fc3f7' },
        { type: 'break', id: 'b1', duration: 300, visualWidth: 80 },
        { type: 'rail', id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, color: '#81c784' }
    ];

    function addItem(type) {
        const id = 'id' + Math.random().toString(36).substr(2, 5);
        if (type === 'rail') {
            sequence.push({ type: 'rail', id, name: 'NEW_RAIL', delay: 10, rise: 5, color: '#ba68c8' });
        } else {
            sequence.push({ type: 'break', id, duration: 200, visualWidth: 80 });
        }
        updateUI();
    }

    function removeItem(id) {
        sequence = sequence.filter(i => i.id !== id);
        updateUI();
    }

    function updateVal(id, key, val) {
        const item = sequence.find(i => i.id === id);
        if (item) {
            item[key] = (typeof item[key] === 'string') ? val : (parseFloat(val) || 0);
            render();
        }
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        sequence.forEach(item => {
            const card = document.createElement('div');
            card.className = `item-card ${item.type}`;
            if (item.type === 'rail') {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <input type="text" value="${item.name}" oninput="updateVal('${item.id}', 'name', this.value)">
                    <div style="display:flex;gap:5px"><div style="flex:1"><label>Delay</label><input type="number" value="${item.delay}" oninput="updateVal('${item.id}', 'delay', this.value)"></div>
                    <div style="flex:1"><label>Rise</label><input type="number" value="${item.rise}" oninput="updateVal('${item.id}', 'rise', this.value)"></div></div>
                    <label>Color</label><input type="color" value="${item.color}" oninput="updateVal('${item.id}', 'color', this.value)">`;
            } else {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <div style="font-weight:bold; color:var(--break); font-size:0.7rem">CURVY TIME BREAK (~)</div>
                    <div style="display:flex;gap:5px"><div style="flex:1"><label>Duration (ms)</label><input type="number" value="${item.duration}" oninput="updateVal('${item.id}', 'duration', this.value)"></div>
                    <div style="flex:1"><label>Width (px)</label><input type="number" value="${item.visualWidth}" oninput="updateVal('${item.id}', 'visualWidth', this.value)"></div></div>`;
            }
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isBW = document.getElementById('datasheetMode').checked;
        const colors = { bg: isBW?"#fff":"#0a0a0a", text: isBW?"#333":"#888", arrow: isBW?"#444":"#ffea00" };
        svg.style.background = colors.bg;
        svg.innerHTML = '';
        
        const SCALE = 5, LANE_H = 100, X_OFF = 160;
        let globalX = X_OFF;
        
        const railCount = sequence.filter(i => i.type === 'rail').length;
        const totalHeight = (railCount + 1) * LANE_H + 100;
        svg.setAttribute('height', totalHeight);

        let railIndex = 0;
        sequence.forEach((item) => {
            if (item.type === 'break') {
                drawCurvyBreak(svg, globalX, item.visualWidth, item.duration, totalHeight, colors.text, isBW);
                globalX += item.visualWidth; 
            } else {
                const yBase = (railIndex + 1) * LANE_H + 50;
                const rStart = globalX + (item.delay * SCALE);
                const rEnd = rStart + (item.rise * SCALE);
                const stroke = isBW ? "#000" : item.color;
                
                svg.innerHTML += `<path d="M ${X_OFF},${yBase} L ${rStart},${yBase} L ${rEnd},${yBase-40} L 2800,${yBase-40}" 
                                   fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round" />`;
                
                svg.innerHTML += `<text x="15" y="${yBase-10}" fill="${stroke}" font-size="14" font-weight="bold">${item.name}</text>`;
                if (item.delay > 0) drawArrow(svg, globalX, rStart, yBase-15, `${item.delay}ms`, colors.arrow);
                
                globalX = rEnd; 
                railIndex++;
            }
        });
    }

    function drawCurvyBreak(svg, x, width, ms, height, color, isBW) {
        const midX = x + (width / 2);
        const rectFill = isBW ? "#fff" : "#0a0a0a";
        const curveOffset = 15; // Width of the curve swing
        const gap = 8; // Gap between the two curves

        // Clear background
        svg.innerHTML += `<rect x="${x}" y="0" width="${width}" height="${height}" fill="${rectFill}" />`;

        // Generate Path for one curvy line
        // We use M (move), and C (cubic bezier) to create the snake look
        const createCurvePath = (offsetX) => {
            let path = `M ${offsetX} 0`;
            for (let y = 0; y < height; y += 100) {
                path += ` C ${offsetX + curveOffset} ${y + 25}, ${offsetX - curveOffset} ${y + 75}, ${offsetX} ${y + 100}`;
            }
            return path;
        };

        // Draw the two parallel curves
        svg.innerHTML += `<path d="${createCurvePath(midX - gap)}" stroke="${color}" stroke-width="2.5" fill="none" />`;
        svg.innerHTML += `<path d="${createCurvePath(midX + gap)}" stroke="${color}" stroke-width="2.5" fill="none" />`;

        // Label
        svg.innerHTML += `
            <rect x="${midX-35}" y="12" width="70" height="22" fill="${rectFill}" />
            <text x="${midX}" y="28" fill="${color}" font-size="12" text-anchor="middle" font-weight="bold" font-family="monospace">${ms}ms</text>
        `;
    }

    function drawArrow(svg, x1, x2, y, txt, col) {
        svg.innerHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="1.5" />
            <path d="M${x1+6} ${y-4} L${x1} ${y} L${x1+6} ${y+4} M${x2-6} ${y-4} L${x2} ${y} L${x2-6} ${y+4}" fill="none" stroke="${col}" stroke-width="1.5"/>
            <text x="${(x1+x2)/2}" y="${y-8}" fill="${col}" font-size="11" text-anchor="middle" font-weight="bold" font-family="monospace">${txt}</text>`;
    }

    updateUI();
</script>
</body>
</html>
