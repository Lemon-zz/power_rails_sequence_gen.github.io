<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Power-Up Sequence Designer | Hardware Timing & Sequence Diagram Tool</title>
    <meta name="title" content="Power-Up sequence Designer | Hardware Timing & Sequence Diagram Tool">
    <meta name="description" content="Free browser tool for hardware engineers to design power-up and power-down timing sequences. Generate voltage rail diagrams with Tn markers and export to SVG.">
    <meta name="keywords" content="power-up sequence, timing diagram generator, hardware engineering tool, voltage rail sequencer, PCB design, power-down sequence, SVG export, electronics design">
    <meta name="author" content="Lemon_ZZ">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/Lemon-zz/power_rails_sequence_gen"> <meta property="og:title" content="Power-Up Designer | Hardware Timing Diagram Tool">
    <meta property="og:description" content="Design pro-grade power sequences in seconds. Features Tn markers, power-down cloning, and vector SVG export.">

    <link rel="canonical" href="https://github.com/Lemon-zz/power_rails_sequence_gen">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Power-Up Designer",
      "description": "A web-based utility for designing and exporting power-up and power-down timing sequences for hardware engineering.",
      "applicationCategory": "DesignApplication, EngineeringTool",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Dynamic Power-Up/Down Sequencing",
        "Automatic Tn Marker Generation",
        "Vector SVG Export",
        "Datasheet Print Mode",
        "Dependency Tracking"
      ]
    }
    </script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; --break: #ff9800; --down: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: 800; }
        .item-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; }
        .item-card.break { border-left-color: var(--break); }
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 4px; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #444; color: #ff5252; border: none; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; }
        .main { flex-grow: 1; background: #0a0a0a; overflow: auto; }
        #visualizer { display: block; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; position: sticky; bottom: 0; background: var(--panel); padding-top: 10px; flex-wrap: wrap; }
        button { border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1 1 45%; font-size: 0.75rem; }
        .btn-rail { background: var(--accent); color: #000; }
        .btn-break { background: var(--break); color: #000; }
        .btn-clone { background: #9c27b0; color: white; flex: 1 1 100%; }
        .btn-export { background: #2196f3; color: white; flex: 1 1 100%; }
        .toggle-container { background: #2d2d2d; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; font-size: 0.75rem; cursor: pointer; }
        .mode-indicator { font-weight: 900; padding: 6px; border-radius: 4px; margin: 10px 0; text-align: center; font-size: 0.8rem; }
        .up { background: rgba(0, 230, 118, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        .down { background: rgba(255, 82, 82, 0.15); color: var(--down); border: 1px solid var(--down); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ POWER_SEQUENCE_EDITOR ]</h2>
    <div id="modeStatus" class="mode-indicator up">MODE: POWER UP</div>
    
    <label class="toggle-container">
        <input type="checkbox" id="powerDownMode" onchange="toggleMode()"> 
        <span>REVERSE LOGIC (DOWN)</span>
    </label>
    <label class="toggle-container">
        <input type="checkbox" id="datasheetMode" onchange="render()"> 
        <span>B&W MODE</span>
    </label>

    <div id="itemList"></div>

    <div class="btn-group">
        <button class="btn-rail" onclick="addItem('rail')">+ RAIL</button>
        <button class="btn-break" onclick="addItem('break')">+ BREAK</button>
        <button class="btn-clone" onclick="cloneToPowerDown()">🔄 CLONE TO POWER DOWN</button>
        <button class="btn-export" onclick="exportSVG()">💾 EXPORT TO SVG</button>
    </div>
</div>

<div class="main"><svg id="visualizer" xmlns="http://www.w3.org/2000/svg"></svg></div>

<script>
    let sequence = [
        { type: 'rail', id: 'r1', name: '12V_VIN', delay: 0, rise: 5, color: '#4fc3f7', parentId: 'none' },
        { type: 'rail', id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, color: '#81c784', parentId: 'r1' },
        { type: 'rail', id: 'r3', name: '1V8_CORE', delay: 15, rise: 8, color: '#ffb74d', parentId: 'r2' }
    ];

    function toggleMode() {
        const isDown = document.getElementById('powerDownMode').checked;
        const status = document.getElementById('modeStatus');
        status.innerText = isDown ? "MODE: POWER DOWN" : "MODE: POWER UP";
        status.className = `mode-indicator ${isDown ? 'down' : 'up'}`;
        render();
    }

    function cloneToPowerDown() {
        // 1. Filter only rails
        let railsOnly = sequence.filter(i => i.type === 'rail');
        // 2. Reverse them (Last UP is usually First DOWN)
        railsOnly.reverse();
        // 3. Rebuild parents to maintain the chain in reverse
        let newSequence = [];
        railsOnly.forEach((rail, index) => {
            newSequence.push({
                ...rail,
                id: 'dn_' + rail.id,
                parentId: index === 0 ? 'none' : 'dn_' + railsOnly[index-1].id
            });
        });
        sequence = newSequence;
        document.getElementById('powerDownMode').checked = true;
        toggleMode();
        updateUI();
    }

    function addItem(type) {
        const id = 'id' + Math.random().toString(36).substr(2, 5);
        if (type === 'rail') {
            const last = sequence.filter(r => r.type === 'rail').pop();
            sequence.push({ type: 'rail', id, name: 'NEW_RAIL', delay: 10, rise: 5, color: '#ba68c8', parentId: last ? last.id : 'none' });
        } else {
            sequence.push({ type: 'break', id, duration: 200, visualWidth: 40 });
        }
        updateUI();
    }

    function removeItem(id) {
        sequence = sequence.filter(i => i.id !== id);
        updateUI();
    }

    function updateVal(id, key, val, needsUIUpdate = false) {
        const item = sequence.find(i => i.id === id);
        if (item) {
            item[key] = (typeof item[key] === 'string') ? val : (parseFloat(val) || 0);
            if (needsUIUpdate) updateUI(); else render();
        }
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        const railOptions = sequence.filter(i => i.type === 'rail');
        sequence.forEach(item => {
            const card = document.createElement('div');
            card.className = `item-card ${item.type}`;
            if (item.type === 'rail') {
                let options = `<option value="none">None (Start 0)</option>`;
                railOptions.forEach(r => { if (r.id !== item.id) options += `<option value="${r.id}" ${item.parentId === r.id ? 'selected' : ''}>${r.name}</option>`; });
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <input type="text" value="${item.name}" oninput="updateVal('${item.id}', 'name', this.value)">
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>Delay</label><input type="number" value="${item.delay}" oninput="updateVal('${item.id}', 'delay', this.value)"></div>
                        <div style="flex:1"><label>Fall/Rise</label><input type="number" value="${item.rise}" oninput="updateVal('${item.id}', 'rise', this.value)"></div>
                    </div>
                    <label>Trigger Parent</label><select onchange="updateVal('${item.id}', 'parentId', this.value, true)">${options}</select>`;
            } else {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <div style="font-weight:bold; color:var(--break); font-size:0.7rem">TIME BREAK</div>
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>ms</label><input type="number" value="${item.duration}" oninput="updateVal('${item.id}', 'duration', this.value)"></div>
                        <div style="flex:1"><label>px</label><input type="number" value="${item.visualWidth}" oninput="updateVal('${item.id}', 'visualWidth', this.value)"></div>
                    </div>`;
            }
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isDown = document.getElementById('powerDownMode').checked;
        const isBW = document.getElementById('datasheetMode').checked;
        
        const colors = { 
            bg: isBW ? "#fff" : "#0a0a0a", 
            text: isBW ? "#333" : "#888", 
            arrow: isBW ? "#444" : (isDown ? "#ff5252" : "#ffea00"), 
            marker: isBW ? "#bbb" : "#333", 
            markerText: isBW ? "#000" : (isDown ? "#ff5252" : "#00e676") 
        };

        svg.style.background = colors.bg;
        svg.innerHTML = '';
        
        const SCALE = 5, LANE_H = 100, X_OFF = 160;
        let globalTimelineX = X_OFF;
        let railGeometries = {}; 
        let breakList = [];
        let maxReachedX = X_OFF;

        let railIndex = 0;
        sequence.forEach((item) => {
            if (item.type === 'break') {
                breakList.push({ x: globalTimelineX, width: item.visualWidth, ms: item.duration });
                globalTimelineX += item.visualWidth;
            } else {
                const y = (railIndex + 1) * LANE_H + 50;
                let anchorX = globalTimelineX;
                if (item.parentId !== 'none' && railGeometries[item.parentId]) anchorX = railGeometries[item.parentId].end;
                const start = anchorX + (item.delay * SCALE);
                const end = start + (item.rise * SCALE);
                
                railGeometries[item.id] = { y, start, end, name: item.name, color: isBW ? "#000" : item.color, anchorX, delay: item.delay, parentId: item.parentId };
                globalTimelineX = end;
                maxReachedX = Math.max(maxReachedX, end);
                railIndex++;
            }
        });

        const totalWidth = maxReachedX + 250;
        const totalHeight = (railIndex + 1) * LANE_H + 50;
        svg.setAttribute('width', totalWidth);
        svg.setAttribute('height', totalHeight);

        Object.values(railGeometries).forEach((g, i) => drawGlobalMarker(svg, g.start, totalHeight, `T${i}`, colors.marker, colors.markerText));

        Object.values(railGeometries).forEach(g => {
            let path = isDown ? 
                `M ${X_OFF},${g.y-40} L ${g.start},${g.y-40} L ${g.end},${g.y} L ${totalWidth},${g.y}` :
                `M ${X_OFF},${g.y} L ${g.start},${g.y} L ${g.end},${g.y-40} L ${totalWidth},${g.y-40}`;
            
            svg.innerHTML += `<path d="${path}" fill="none" stroke="${g.color}" stroke-width="3" stroke-linecap="round" />`;
            svg.innerHTML += `<text x="15" y="${g.y-10}" fill="${g.color}" font-size="14" font-weight="bold" font-family="Arial">${g.name}</text>`;
            
            if (g.parentId !== 'none' && railGeometries[g.parentId]) {
                const parent = railGeometries[g.parentId];
                const yF = isDown ? parent.y : parent.y - 40;
                const yT = isDown ? g.y - 40 : g.y - 15;
                svg.innerHTML += `<line x1="${g.anchorX}" y1="${yF}" x2="${g.anchorX}" y2="${yT}" stroke="${colors.arrow}" stroke-width="1" stroke-dasharray="3,3" opacity="0.6" />`;
            }
            if (g.delay > 0) drawArrow(svg, g.anchorX, g.start, isDown ? g.y-45 : g.y-15, `${g.delay}ms`, colors.arrow);
        });

        breakList.forEach(b => drawCurvyBreak(svg, b.x, b.width, b.ms, totalHeight, colors.text, colors.bg));
    }

    function drawGlobalMarker(svg, x, h, label, col, txtCol) {
        svg.innerHTML += `<line x1="${x}" y1="40" x2="${x}" y2="${h - 20}" stroke="${col}" stroke-width="1" stroke-dasharray="4,4" />`;
        svg.innerHTML += `<text x="${x}" y="30" fill="${txtCol}" font-size="11" font-weight="bold" text-anchor="middle">${label}</text>`;
        svg.innerHTML += `<text x="${x}" y="${h - 5}" fill="${txtCol}" font-size="11" font-weight="bold" text-anchor="middle">${label}</text>`;
    }

    function drawCurvyBreak(svg, x, width, ms, height, color, bg) {
        const midX = x + (width / 2);
        const curve = width / 3, gap = width / 5;
        svg.innerHTML += `<rect x="${x}" y="0" width="${width}" height="${height}" fill="${bg}" />`;
        const p = (off) => {
            let d = `M ${off} 0`;
            for (let y = 0; y < height; y += 100) d += ` C ${off + curve} ${y + 25}, ${off - curve} ${y + 75}, ${off} ${y + 100}`;
            return d;
        };
        svg.innerHTML += `<path d="${p(midX-gap)}" stroke="${color}" stroke-width="2" fill="none" />
                          <path d="${p(midX+gap)}" stroke="${color}" stroke-width="2" fill="none" />
                          <text x="${midX}" y="50" fill="${color}" font-size="12" font-weight="bold" text-anchor="middle" font-family="monospace">${ms}ms</text>`;
    }

    function drawArrow(svg, x1, x2, y, txt, col) {
        svg.innerHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="1.5" />
            <path d="M${x1+6} ${y-4} L${x1} ${y} L${x1+6} ${y+4} M${x2-6} ${y-4} L${x2} ${y} L${x2-6} ${y+4}" fill="none" stroke="${col}" />
            <text x="${(x1+x2)/2}" y="${y-8}" fill="${col}" font-size="11" text-anchor="middle" font-weight="bold" font-family="monospace">${txt}</text>`;
    }

    function exportSVG() {
        const svgElement = document.getElementById('visualizer');
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const svgUrl = URL.createObjectURL(svgBlob);
        const downloadLink = document.createElement("a");
        downloadLink.href = svgUrl;
        downloadLink.download = "power_sequence_export.svg";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    updateUI();
</script>
</body>
</html>
